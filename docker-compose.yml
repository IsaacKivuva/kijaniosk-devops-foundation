version: '3.8'

services:
  jenkins:
    image: jenkins/jenkins:lts
    container_name: jenkins
    restart: unless-stopped
    ports:
      - "8080:8080"
      - "50000:50000"
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - ci-network

  nexus:
    image: sonatype/nexus3:3.68.0
    container_name: nexus
    restart: unless-stopped
    ports:
      - "8081:8081"
      - "8082:8082"
    volumes:
      - nexus_data:/nexus-data
    networks:
      - ci-network

volumes:
  jenkins_home:
    name: jenkins_home
  nexus_data:
    name: nexus_data


networks:
  ci-network:
    driver: bridge